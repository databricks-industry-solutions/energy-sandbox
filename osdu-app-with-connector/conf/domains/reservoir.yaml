name: reservoir
description: "OSDU reservoir / reservoir unit style master data (search kind is environment-specific)."
primary_key: id
incremental_field: data.modifyTime
phase: 1

extraction:
  method: POST
  path: /api/search/v2/query
  base_query:
    kind: "osdu:wks:master-data--Reservoir:*"
    query: ""
  incremental_filter_template: 'data.modifyTime:>="{watermark}"'

pagination:
  style: cursor_body
  records_path: results
  cursor_path: cursor
  cursor_request_field: cursor
  page_size: 50

normalization:
  record_id_path: id
  record_kind_path: kind
  modify_time_path: data.modifyTime
  field_map:
    reservoir_name: data.ReservoirName
    field_name: data.FieldName
