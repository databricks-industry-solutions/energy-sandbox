bundle:
  name: bop-guardian

resources:
  apps:
    bop-guardian:
      name: bop-guardian
      description: BOP Guardian

      source_code_path: .

      resources:
        - name: bop-guardian-lakebase
          description: "Lakebase PostgreSQL for BOP Guardian telemetry, anomalies, and work orders"
          database:
            instance_name: bop-guardian-db
            database_name: bop_guardian_app
            permission: CAN_CONNECT_AND_CREATE

      env:
        - name: ENVIRONMENT
          value: "production"
        - name: PGUSER
          valueFrom: bop-guardian-lakebase
        - name: PGPORT
          valueFrom: bop-guardian-lakebase
        - name: PGDATABASE_OVERRIDE
          value: "bop_guardian_app"

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://YOUR-WORKSPACE.cloud.databricks.com
      profile: fe-vm-oil-pump-monitor

  prod:
    mode: production
    workspace:
      host: https://YOUR-WORKSPACE.cloud.databricks.com
      profile: fe-vm-oil-pump-monitor

  demo:
    mode: production
    workspace:
      host: https://e2-demo-west.cloud.databricks.com
      profile: e2-demo-west
