command:
  - "python"
  - "-m"
  - "uvicorn"
  - "app:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"

resources:
  - name: sql-warehouse
    description: "SQL warehouse for sim results and Unity Catalog"
    sql_warehouse:
      id: <your-warehouse-id>
      permission: CAN_USE

env:
  - name: DATABRICKS_WAREHOUSE_ID
    valueFrom: sql-warehouse
