bundle:
  name: reservoir-simulator

resources:
  apps:
    reservoir-simulator:
      name: reservoir-simulator
      description: Reservoir Simulator
      source_code_path: .

      resources:
        - name: sql-warehouse
          description: "SQL warehouse for reading sim results from Unity Catalog"
          sql_warehouse:
            id: "<your-warehouse-id>"
            permission: CAN_USE

      env:
        - name: DATABRICKS_WAREHOUSE_ID
          value_from: sql-warehouse

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://YOUR-WORKSPACE.cloud.databricks.com
      profile: fe-vm-oil-pump-monitor

  prod:
    mode: production
    workspace:
      host: https://YOUR-WORKSPACE.cloud.databricks.com
      profile: fe-vm-oil-pump-monitor

  demo:
    mode: production
    workspace:
      host: https://e2-demo-west.cloud.databricks.com
      profile: e2-demo-west
